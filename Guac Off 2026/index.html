<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SF GUAC OFF 2026 - Guac-y Road</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="game-container">
        <div id="debug-overlay" style="position:fixed; top:5px; left:5px; background:rgba(0,0,0,0.8); color:lime; padding:5px; z-index:9999; font-family:monospace; pointer-events:none; font-size: 10px;"></div>
        <canvas id="game-canvas"></canvas>
        <div id="billboards-container" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;"></div>
        <button id="music-toggle" class="music-toggle">🎵 Music: ON</button>
        <button id="restart-btn" class="restart-btn">🔄 Restart</button>
        <div id="menu-overlay" class="menu-overlay">
            <h1>SF GUAC OFF 2026</h1>
            
            <div id="step-1" class="menu-step">
                <h2>Choose Your Ride</h2>
                <div class="selection-grid" id="vehicle-grid">
                    <div class="grid-item selected" data-value="bike"><img src="assets/bike_stopped.png" alt="Bike"><p>Bike</p></div>
                    <div class="grid-item" data-value="waymo"><img src="assets/waymo_stopped.png" alt="Waymo"><p>Waymo</p></div>
                    <div class="grid-item" data-value="motorcycle"><img src="assets/motorcycle_stopped.png" alt="Motorcycle"><p>Harley</p></div>
                    <div class="grid-item" data-value="scooter"><img src="assets/scooter_stopped.png" alt="Scooter"><p>Scooter</p></div>
                </div>
            </div>
            
            <div id="step-2" class="menu-step">
                <h2>Choose Your Road</h2>
                <div class="selection-grid" id="road-grid">
                    <div class="grid-item selected" data-value="mttam"><img src="assets/bg.png" alt="Mt. Tam"><p>Mt. Tam</p></div>
                    <div class="grid-item" data-value="mission"><img src="assets/bg_mission.png" alt="Mission"><p>Mission</p></div>
                    <div class="grid-item" data-value="ggp"><img src="assets/bg_ggp.png" alt="GGP"><p>GGP</p></div>
                    <div class="grid-item" data-value="market"><img src="assets/bg_market_street.png" alt="Market"><p>Market St</p></div>
                    <div class="grid-item" data-value="custom" id="upload-item"><div class="upload-icon">📤</div><p>Upload</p></div>
                </div>
                <input type="file" id="bg-upload" accept="image/*" style="display: none;">
            </div>
            
            <div class="menu-actions">
                <button id="dice-btn" class="dice-btn">🎲 Random</button>
                <button id="start-btn" class="start-btn">START RIDE</button>
            </div>
        </div>
        <div class="ui-layer">
            <!-- UI removed as per user request -->
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
